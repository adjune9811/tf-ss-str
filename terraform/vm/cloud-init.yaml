#cloud-config
# This script runs ONCE when the VM boots for the first time.
# It installs Nginx and sets up the web root directory.

package_update: true
package_upgrade: false

packages:
  - nginx
  - curl

runcmd:
  # Enable and start Nginx
  - systemctl enable nginx
  - systemctl start nginx

  # Create a deploy directory that the CI/CD pipeline will copy files into
  - mkdir -p /var/www/html
  - chown -R azureuser:www-data /var/www/html
  - chmod -R 755 /var/www/html

  # Default Nginx site already serves /var/www/html — no extra config needed
