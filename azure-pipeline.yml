# ─────────────────────────────────────────────────────────────────────────────
# Azure Pipeline — Deploy Terraform Storage (no marketplace extensions needed)
# Uses built-in AzureCLI@2 task + installs Terraform via script
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - "*.tf"
      - terraform.tfvars
      - azure-pipeline.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - "*.tf"
      - terraform.tfvars

pool:
  vmImage: "ubuntu-latest"

variables:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "$(System.DefaultWorkingDirectory)"
  SERVICE_CONNECTION: "azure-service-connection"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — VALIDATE
# Installs Terraform, checks formatting and syntax. No Azure login needed.
# ══════════════════════════════════════════════════════════════════════════════
stages:
  - stage: Validate
    displayName: "Validate"

    jobs:
      - job: TerraformValidate
        displayName: "terraform fmt + validate"

        steps:
          - checkout: self

          # Install Terraform by downloading directly from HashiCorp
          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: "Install Terraform $(TF_VERSION)"

          - script: |
              echo "=== Checking formatting ==="
              terraform fmt -check -diff
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform fmt -check"

          - script: |
              echo "=== Initializing providers ==="
              terraform init -backend=false
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform init (no backend)"

          - script: |
              echo "=== Validating ==="
              terraform validate
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform validate"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — PLAN
# Logs into Azure via service connection, runs terraform plan
# ══════════════════════════════════════════════════════════════════════════════
  - stage: Plan
    displayName: "Plan"
    dependsOn: Validate
    condition: |
      and(
        succeeded('Validate'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )

    jobs:
      - job: TerraformPlan
        displayName: "terraform plan"

        steps:
          - checkout: self

          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: "Install Terraform $(TF_VERSION)"

          # AzureCLI@2 is a built-in task — no extension needed.
          # It automatically sets ARM_CLIENT_ID, ARM_CLIENT_SECRET,
          # ARM_SUBSCRIPTION_ID, ARM_TENANT_ID from the service connection,
          # which is exactly what the azurerm provider needs to authenticate.
          - task: AzureCLI@2
            displayName: "terraform init + plan"
            inputs:
              azureSubscription: $(SERVICE_CONNECTION)
              scriptType: "bash"
              scriptLocation: "inlineScript"
              workingDirectory: $(WORKING_DIR)
              addSpnToEnvironment: true   # injects ARM_ vars into the shell
              inlineScript: |
                # Export ARM vars so Terraform picks them up
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                echo "=== terraform init ==="
                terraform init -backend=false

                echo "=== terraform plan ==="
                terraform plan \
                  -var-file="terraform.tfvars" \
                  -var="subscription_id=$ARM_SUBSCRIPTION_ID" \
                  -out="$(WORKING_DIR)/tfplan"

                echo "=== Plan summary ==="
                terraform show -no-color tfplan

          - task: PublishBuildArtifacts@1
            displayName: "Publish plan artifact"
            inputs:
              pathToPublish: "$(WORKING_DIR)/tfplan"
              artifactName: "tfplan"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — APPLY
# Downloads the saved plan and applies it to Azure
# ══════════════════════════════════════════════════════════════════════════════
  - stage: Apply
    displayName: "Apply"
    dependsOn: Plan
    condition: succeeded('Plan')

    jobs:
      - deployment: TerraformApply
        displayName: "terraform apply"
        environment: "tf-storage"

        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                    unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
                    sudo mv terraform /usr/local/bin/
                    terraform version
                  displayName: "Install Terraform $(TF_VERSION)"

                - task: DownloadBuildArtifacts@1
                  displayName: "Download plan artifact"
                  inputs:
                    artifactName: "tfplan"
                    downloadPath: "$(WORKING_DIR)"

                - task: AzureCLI@2
                  displayName: "terraform init + apply"
                  inputs:
                    azureSubscription: $(SERVICE_CONNECTION)
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    workingDirectory: $(WORKING_DIR)
                    addSpnToEnvironment: true
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                      echo "=== terraform init ==="
                      terraform init -backend=false

                      echo "=== terraform apply ==="
                      terraform apply -auto-approve "$(WORKING_DIR)/tfplan/tfplan"

                      echo "=== Resources deployed ==="
                      terraform state list
