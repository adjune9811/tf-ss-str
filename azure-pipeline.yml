# ─────────────────────────────────────────────────────────────────────────────
# Azure Pipeline — Deploy Terraform Storage
# Runs on a self-hosted Windows agent (your PC)
# Terraform must be installed on your PC: https://developer.hashicorp.com/terraform/install
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - "*.tf"
      - terraform.tfvars
      - azure-pipeline.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - "*.tf"
      - terraform.tfvars

# Self-hosted agent running on your Windows PC — free, no parallel job needed
pool:
  name: "MyPC"

variables:
  WORKING_DIR: "$(System.DefaultWorkingDirectory)"
  SERVICE_CONNECTION: "azure-service-connection"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — VALIDATE
# ══════════════════════════════════════════════════════════════════════════════
stages:
  - stage: Validate
    displayName: "Validate"

    jobs:
      - job: TerraformValidate
        displayName: "terraform fmt + validate"

        steps:
          - checkout: self

          - powershell: |
              Write-Host "=== Terraform version ==="
              terraform version
            workingDirectory: $(WORKING_DIR)
            displayName: "Check Terraform installed"

          - powershell: |
              Write-Host "=== Checking formatting ==="
              terraform fmt -check -diff
              if ($LASTEXITCODE -ne 0) { exit 1 }
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform fmt -check"

          - powershell: |
              Write-Host "=== Initializing providers ==="
              terraform init -backend=false
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform init (no backend)"

          - powershell: |
              Write-Host "=== Validating ==="
              terraform validate
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform validate"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — PLAN
# ══════════════════════════════════════════════════════════════════════════════
  - stage: Plan
    displayName: "Plan"
    dependsOn: Validate
    condition: |
      and(
        succeeded('Validate'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )

    jobs:
      - job: TerraformPlan
        displayName: "terraform plan"

        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "terraform init + plan"
            inputs:
              azureSubscription: $(SERVICE_CONNECTION)
              scriptType: "pscore"
              scriptLocation: "inlineScript"
              workingDirectory: $(WORKING_DIR)
              addSpnToEnvironment: true
              inlineScript: |
                $env:ARM_CLIENT_ID       = $env:servicePrincipalId
                $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
                $env:ARM_TENANT_ID       = $env:tenantId
                $env:ARM_SUBSCRIPTION_ID = $(az account show --query id -o tsv)

                Write-Host "=== terraform init ==="
                terraform init -backend=false

                Write-Host "=== terraform plan ==="
                terraform plan `
                  -var-file="terraform.tfvars" `
                  -var="subscription_id=$env:ARM_SUBSCRIPTION_ID" `
                  -out="$(WORKING_DIR)\tfplan"

                Write-Host "=== Plan summary ==="
                terraform show -no-color "$(WORKING_DIR)\tfplan"

          - task: PublishBuildArtifacts@1
            displayName: "Publish plan artifact"
            inputs:
              pathToPublish: "$(WORKING_DIR)/tfplan"
              artifactName: "tfplan"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — APPLY
# ══════════════════════════════════════════════════════════════════════════════
  - stage: Apply
    displayName: "Apply"
    dependsOn: Plan
    condition: succeeded('Plan')

    jobs:
      - deployment: TerraformApply
        displayName: "terraform apply"
        environment: "tf-storage"

        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: DownloadBuildArtifacts@1
                  displayName: "Download plan artifact"
                  inputs:
                    artifactName: "tfplan"
                    downloadPath: "$(WORKING_DIR)"

                - task: AzureCLI@2
                  displayName: "terraform init + apply"
                  inputs:
                    azureSubscription: $(SERVICE_CONNECTION)
                    scriptType: "pscore"
                    scriptLocation: "inlineScript"
                    workingDirectory: $(WORKING_DIR)
                    addSpnToEnvironment: true
                    inlineScript: |
                      $env:ARM_CLIENT_ID       = $env:servicePrincipalId
                      $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
                      $env:ARM_TENANT_ID       = $env:tenantId
                      $env:ARM_SUBSCRIPTION_ID = $(az account show --query id -o tsv)

                      Write-Host "=== terraform init ==="
                      terraform init -backend=false

                      Write-Host "=== terraform apply ==="
                      terraform apply -auto-approve "$(WORKING_DIR)\tfplan\tfplan"

                      Write-Host "=== Resources deployed ==="
                      terraform state list
