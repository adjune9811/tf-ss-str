# ─────────────────────────────────────────────────────────────────────────────
# Azure Pipeline — Deploy Terraform Storage
# Runs on Microsoft-hosted Ubuntu (1800 free mins/month for private projects)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - "*.tf"
      - terraform.tfvars
      - azure-pipeline.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - "*.tf"
      - terraform.tfvars

pool:
  vmImage: "ubuntu-latest"

variables:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "$(System.DefaultWorkingDirectory)"
  SERVICE_CONNECTION: "azure-service-connection"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — VALIDATE
# ══════════════════════════════════════════════════════════════════════════════
stages:
  - stage: Validate
    displayName: "Validate"

    jobs:
      - job: TerraformValidate
        displayName: "terraform fmt + validate"

        steps:
          - checkout: self

          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: "Install Terraform"

          - script: terraform fmt -check -diff
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform fmt -check"

          - script: terraform init -backend=false
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform init"

          - script: terraform validate
            workingDirectory: $(WORKING_DIR)
            displayName: "terraform validate"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — PLAN
# ══════════════════════════════════════════════════════════════════════════════
  - stage: Plan
    displayName: "Plan"
    dependsOn: Validate
    condition: |
      and(
        succeeded('Validate'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )

    jobs:
      - job: TerraformPlan
        displayName: "terraform plan"

        steps:
          - checkout: self

          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: "Install Terraform"

          - task: AzureCLI@2
            displayName: "terraform init + plan"
            inputs:
              azureSubscription: $(SERVICE_CONNECTION)
              scriptType: "bash"
              scriptLocation: "inlineScript"
              workingDirectory: $(WORKING_DIR)
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform init -backend=false

                terraform plan \
                  -var-file="terraform.tfvars" \
                  -var="subscription_id=$ARM_SUBSCRIPTION_ID" \
                  -out="$(WORKING_DIR)/tfplan"

                terraform show -no-color $(WORKING_DIR)/tfplan

          - task: PublishBuildArtifacts@1
            displayName: "Publish plan artifact"
            inputs:
              pathToPublish: "$(WORKING_DIR)/tfplan"
              artifactName: "tfplan"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — APPLY
# ══════════════════════════════════════════════════════════════════════════════
  - stage: Apply
    displayName: "Apply"
    dependsOn: Plan
    condition: succeeded('Plan')

    jobs:
      - deployment: TerraformApply
        displayName: "terraform apply"
        environment: "tf-storage"

        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                    unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
                    sudo mv terraform /usr/local/bin/
                    terraform version
                  displayName: "Install Terraform"

                - task: DownloadBuildArtifacts@1
                  displayName: "Download plan artifact"
                  inputs:
                    artifactName: "tfplan"
                    downloadPath: "$(WORKING_DIR)"

                - task: AzureCLI@2
                  displayName: "terraform init + apply"
                  inputs:
                    azureSubscription: $(SERVICE_CONNECTION)
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    workingDirectory: $(WORKING_DIR)
                    addSpnToEnvironment: true
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                      terraform init -backend=false

                      terraform apply -auto-approve "$(WORKING_DIR)/tfplan/tfplan"

                      echo "=== Resources deployed ==="
                      terraform state list
