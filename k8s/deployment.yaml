# CONCEPT: Kubernetes Deployment
# A Deployment tells Kubernetes to run N replicas of your container and keep them healthy.
# If a pod crashes, Kubernetes automatically restarts it.
# For updates, it does a rolling deploy: starts new pods before killing old ones.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: default
  labels:
    app: website
spec:
  # CONCEPT: replicas
  # Run 2 copies of the container for basic redundancy.
  # AKS will spread them across nodes automatically.
  replicas: 2

  # CONCEPT: selector
  # Links this Deployment to the pods it manages. Must match template.labels.
  selector:
    matchLabels:
      app: website

  # CONCEPT: strategy — rolling update
  # When you deploy a new image, Kubernetes:
  #   1. Starts 1 new pod (maxSurge)
  #   2. Verifies it's healthy (readinessProbe passes)
  #   3. Kills 1 old pod (maxUnavailable)
  #   4. Repeats until all old pods replaced
  # Zero downtime — old version serves traffic until new is ready.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1         # allow 1 extra pod during update
      maxUnavailable: 0   # never have fewer than replicas running

  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
        - name: website
          # CONCEPT: image tag with build ID
          # The pipeline replaces IMAGE_TAG with the actual build number.
          # Never use 'latest' in production — you lose traceability and rollback ability.
          image: acrdevdemo001.azurecr.io/website:IMAGE_TAG

          ports:
            - containerPort: 80

          # CONCEPT: resource requests and limits
          # requests = minimum guaranteed resources (used for scheduling)
          # limits = maximum allowed (container killed if it exceeds this)
          resources:
            requests:
              cpu: "50m"        # 50 millicores = 5% of 1 CPU
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # CONCEPT: readiness probe
          # Kubernetes won't send traffic to a pod until this passes.
          # Protects against sending traffic to a pod that's still starting up.
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          # CONCEPT: liveness probe
          # If this fails 3 times, Kubernetes restarts the pod automatically.
          # Catches situations where the app is running but stuck/deadlocked.
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
