# CONCEPT: Kubernetes Service
# A Service gives your pods a stable network endpoint.
# Pods come and go (restarts, rolling deploys), but the Service IP stays constant.
#
# LoadBalancer type = Azure creates an Azure Load Balancer with a public IP.
# Traffic flows: Internet → Azure Load Balancer → Kubernetes Service → pods

apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: default
  annotations:
    # CONCEPT: Azure-specific annotations
    # These control how Azure provisions the Load Balancer.
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/health"
spec:
  type: LoadBalancer

  # CONCEPT: selector
  # Routes traffic to pods with label app=website.
  # This is how Service → Deployment connection works in Kubernetes.
  selector:
    app: website

  ports:
    - name: http
      protocol: TCP
      port: 80          # port the load balancer listens on (external)
      targetPort: 80    # port on the container (internal)
