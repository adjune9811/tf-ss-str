# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2 PIPELINE — CI + Build Docker Image + Push to ACR + Deploy to AKS
#
# Flow: code push → Build image → Push to ACR → Provision AKS (Terraform)
#       → Deploy to AKS (kubectl apply) → Smoke test
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/**
      - k8s/**
      - pipelines/phase2-aks.yml

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: aks-deploy-secrets      # Contains: ACR_NAME, AKS_CLUSTER_NAME, RESOURCE_GROUP
  - name: IMAGE_NAME
    value: 'website'
  - name: IMAGE_TAG
    value: '$(Build.BuildId)'      # e.g. "142" — unique per pipeline run
  - name: FULL_IMAGE
    value: '$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1: BUILD — Docker image build + push to ACR
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: Build
    displayName: 'Build & Push Docker Image'

    jobs:
      - job: DockerBuildPush
        displayName: 'Docker build → ACR push'

        steps:
          - checkout: self

          # CONCEPT: Docker@2 task — build
          # Builds the Docker image using the Dockerfile in app/.
          # The task handles 'docker build' with proper tagging.
          - task: Docker@2
            displayName: 'Build Docker image'
            inputs:
              command: 'build'
              dockerfile: 'app/Dockerfile'
              buildContext: 'app'
              repository: '$(IMAGE_NAME)'
              tags: |
                $(IMAGE_TAG)
                latest

          # CONCEPT: Docker@2 task — push to ACR
          # 'containerRegistry' is the name of the Docker Registry service connection
          # you create in Azure DevOps → Project Settings → Service Connections.
          # It authenticates to ACR using the service principal automatically.
          - task: Docker@2
            displayName: 'Push image to ACR'
            inputs:
              command: 'push'
              containerRegistry: 'acr-service-connection'   # service connection name
              repository: '$(IMAGE_NAME)'
              tags: |
                $(IMAGE_TAG)
                latest

          # CONCEPT: update k8s manifest with the real image tag
          # We replace the IMAGE_TAG placeholder in deployment.yaml with the actual build ID.
          # This is how you get exact image traceability — every deploy knows its build number.
          - script: |
              sed -i "s/IMAGE_TAG/$(IMAGE_TAG)/g" k8s/deployment.yaml
              echo "Updated deployment.yaml with image tag $(IMAGE_TAG)"
              cat k8s/deployment.yaml | grep image:
            displayName: 'Inject image tag into K8s manifest'

          # Publish the updated k8s manifests as an artifact
          - task: PublishBuildArtifacts@1
            displayName: 'Publish K8s manifests'
            inputs:
              pathToPublish: 'k8s'
              artifactName: 'k8s-manifests'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2: PROVISION — Terraform for ACR + AKS
# Only runs on main branch. Idempotent — safe to run on every deploy.
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Provision
    displayName: 'Provision AKS + ACR (Terraform)'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

    jobs:
      - job: TerraformApply
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.7.5'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/aks'
              backendServiceArm: 'azure-service-connection'
              backendAzureRmResourceGroupName: 'rg-terraform-state'
              backendAzureRmStorageAccountName: 'stterraformstate001'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'aks/terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/aks'
              environmentServiceNameAzureRM: 'azure-service-connection'
              commandOptions: '-out=tfplan'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/aks'
              environmentServiceNameAzureRM: 'azure-service-connection'
              commandOptions: '-auto-approve tfplan'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3: DEPLOY — kubectl apply to AKS
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to AKS'
    dependsOn:
      - Build
      - Provision
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

    jobs:
      - deployment: DeployToAKS
        displayName: 'kubectl apply → AKS'
        # CONCEPT: environment
        # This named environment tracks deployments in Azure DevOps UI.
        # You can add a manual approval gate here:
        #   Pipelines > Environments > prod-aks > Approvals and checks > Add approval
        environment: 'prod-aks'

        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  displayName: 'Download K8s manifests'
                  inputs:
                    artifactName: 'k8s-manifests'
                    downloadPath: '$(Pipeline.Workspace)'

                # CONCEPT: KubeloginInstaller
                # AKS uses Azure AD authentication. kubelogin converts the service principal
                # credentials from the service connection into a kubectl-compatible token.
                - task: KubeloginInstaller@0
                  displayName: 'Install kubelogin'

                # CONCEPT: AzureCLI task
                # Run any Azure CLI command authenticated as the pipeline service principal.
                # Here we get AKS credentials so kubectl works in subsequent steps.
                - task: AzureCLI@2
                  displayName: 'Get AKS credentials'
                  inputs:
                    azureSubscription: 'azure-service-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(RESOURCE_GROUP) \
                        --name $(AKS_CLUSTER_NAME) \
                        --overwrite-existing
                      kubelogin convert-kubeconfig -l workloadidentity

                # CONCEPT: KubernetesManifest task — deploy
                # Applies the YAML manifests to the cluster.
                # It's smarter than raw kubectl: waits for rollout to complete,
                # substitutes image references, and integrates with AKS deployments.
                - task: KubernetesManifest@1
                  displayName: 'Deploy to AKS'
                  inputs:
                    action: 'deploy'
                    connectionType: 'azureResourceManager'
                    azureSubscriptionConnection: 'azure-service-connection'
                    azureResourceGroup: '$(RESOURCE_GROUP)'
                    kubernetesCluster: '$(AKS_CLUSTER_NAME)'
                    namespace: 'default'
                    manifests: |
                      $(Pipeline.Workspace)/k8s-manifests/deployment.yaml
                      $(Pipeline.Workspace)/k8s-manifests/service.yaml
                    containers: '$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)'
                    # 'containers' tells the task to update the image tag in the manifest
                    # even if the sed replacement above already did it — double safety

                # CONCEPT: post-deploy verification
                # Wait for the rollout to complete, then check the pod status.
                - task: AzureCLI@2
                  displayName: 'Verify rollout and get service IP'
                  inputs:
                    azureSubscription: 'azure-service-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "=== Waiting for rollout to complete ==="
                      kubectl rollout status deployment/website --timeout=3m

                      echo "=== Pod status ==="
                      kubectl get pods -l app=website

                      echo "=== Getting service external IP ==="
                      # Wait up to 2 minutes for Azure Load Balancer IP to be assigned
                      for i in {1..12}; do
                        EXTERNAL_IP=$(kubectl get svc website -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
                        if [ -n "$EXTERNAL_IP" ]; then
                          echo "Site live at: http://$EXTERNAL_IP"
                          break
                        fi
                        echo "Waiting for external IP... ($i/12)"
                        sleep 10
                      done

                      echo "=== Smoke test ==="
                      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$EXTERNAL_IP)
                      if [ "$HTTP_STATUS" != "200" ]; then
                        echo "ERROR: Got HTTP $HTTP_STATUS"
                        exit 1
                      fi
                      echo "SUCCESS: HTTP 200 from AKS"
