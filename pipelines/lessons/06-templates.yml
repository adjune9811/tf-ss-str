# LESSON 6: Using templates
# This pipeline calls the reusable templates we defined.
# Result: a clean, DRY pipeline that reads like high-level intent.
#
# CONCEPT: 3 types of templates
#   - steps template  → reuse a set of steps
#   - job template    → reuse an entire job (or deployment job)
#   - stage template  → reuse an entire stage
#   - variable template → reuse variable definitions

trigger: none

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildJob
        steps:
          # CALLING a steps template
          # Parameters passed here override the template's defaults
          - template: ../templates/steps-build.yml
            parameters:
              nodeVersion: '20'
              runTests: true
              artifactName: 'website'

  - stage: DeployStaging
    displayName: 'Deploy → Staging'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      # CALLING a job template
      - template: ../templates/job-deploy.yml
        parameters:
          environment: 'staging'
          vmIp: '10.0.1.10'
          artifactName: 'website'

  - stage: DeployProd
    displayName: 'Deploy → Prod'
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      # Same template, different parameters — no code duplication
      - template: ../templates/job-deploy.yml
        parameters:
          environment: 'prod'
          vmIp: '10.0.2.10'
          artifactName: 'website'
