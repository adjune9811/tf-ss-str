# LESSON 1: Minimal pipeline
# This is the smallest valid pipeline. No stages, no jobs keyword — just steps.
# Azure DevOps wraps them in a default job automatically.

trigger:
  - main          # run when someone pushes to main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - script: echo "Hello from Azure Pipelines!"
    displayName: 'Print hello'

  - script: |
      echo "Current directory: $(pwd)"
      echo "Who am I: $(whoami)"
      echo "OS info:"
      cat /etc/os-release | head -5
    displayName: 'Show agent environment'
