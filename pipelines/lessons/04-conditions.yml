# LESSON 4: Conditions and Expressions
# Conditions control WHETHER a stage/job/step runs.
# Expressions control computed values in variables and parameters.
#
# Condition syntax: condition: <expression>
# Built-in shortcuts:
#   succeeded()        — previous step/job passed (DEFAULT if no condition set)
#   failed()           — previous step/job failed
#   always()           — run regardless (even after failure) — use for cleanup
#   succeededOrFailed()— run unless cancelled

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  IS_MAIN: $[ eq(variables['Build.SourceBranchName'], 'main') ]
  IS_PR:   $[ eq(variables['Build.Reason'], 'PullRequest') ]

stages:
  # ─── Stage conditions ─────────────────────────────────────────────────────
  - stage: BuildStage
    displayName: 'Build (always runs)'
    jobs:
      - job: Build
        steps:
          - script: |
              echo "Building..."
              mkdir -p $(Build.ArtifactStagingDirectory)
              echo "build-$(Build.BuildId)" > $(Build.ArtifactStagingDirectory)/version.txt
            displayName: 'Build app'

          # CONCEPT: always() condition — cleanup even if build fails
          - script: echo "Cleaning temp files (always runs)"
            displayName: 'Cleanup'
            condition: always()

  # Only deploy on main branch pushes — never on PRs
  - stage: DeployDev
    displayName: 'Deploy to Dev (main only, not PR)'
    dependsOn: BuildStage
    # CONCEPT: compound condition
    # and() / or() / not() combine multiple conditions
    condition: |
      and(
        succeeded('BuildStage'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: Deploy
        steps:
          - script: echo "Deploying to DEV..."
            displayName: 'Deploy to Dev'

  # Only deploy to prod when triggered by a version tag (v*)
  - stage: DeployProd
    displayName: 'Deploy to Prod (tag only)'
    dependsOn: DeployDev
    condition: |
      and(
        succeeded('DeployDev'),
        startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
      )
    jobs:
      - job: Deploy
        steps:
          - script: echo "Deploying to PROD for tag $(Build.SourceBranchName)"
            displayName: 'Deploy to Prod'

  # ─── Step-level conditions ────────────────────────────────────────────────
  - stage: StepConditions
    displayName: 'Step-level condition examples'
    dependsOn: []    # run independently, not after previous stages
    jobs:
      - job: ConditionalSteps
        steps:
          - script: exit 1
            displayName: 'Intentionally failing step'
            continueOnError: true   # don't fail the job when this step fails

          - script: echo "Previous step passed"
            displayName: 'Run on success'
            condition: succeeded()

          - script: echo "Sending failure alert!"
            displayName: 'Run on failure (alerting)'
            condition: failed()

          - script: echo "This always runs — e.g. upload test results even on failure"
            displayName: 'Always run'
            condition: always()

          - script: echo "This is a PR build"
            displayName: 'PR-only step'
            condition: eq(variables['Build.Reason'], 'PullRequest')

          - script: echo "This is NOT a PR build"
            displayName: 'CI-only step (not PR)'
            condition: ne(variables['Build.Reason'], 'PullRequest')

  # ─── Expressions in variable values ──────────────────────────────────────
  - stage: Expressions
    displayName: 'Expressions in variables'
    dependsOn: []
    variables:
      # $[ ] = runtime expression — evaluated when stage/job starts
      # $( ) = macro syntax — evaluated at queue time
      # ${{ }} = template expression — evaluated at parse time (used in templates)

      # Conditional variable value — like a ternary
      DEPLOY_TO: $[ if(eq(variables['Build.SourceBranchName'], 'main'), 'prod', 'dev') ]

    jobs:
      - job: ShowExpressions
        steps:
          - script: |
              echo "DEPLOY_TO   = $(DEPLOY_TO)"
              echo "Build.Reason = $(Build.Reason)"
              echo "SourceBranch = $(Build.SourceBranchName)"
            displayName: 'Show expression results'
