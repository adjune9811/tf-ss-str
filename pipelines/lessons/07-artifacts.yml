# LESSON 7: Artifacts — passing files between jobs and stages
#
# KEY CONCEPT: Each job runs on a FRESH agent with an EMPTY workspace.
# To pass files (your built app) from Build → Deploy, you use artifacts.
#
# Two artifact systems:
#   PublishBuildArtifacts / DownloadBuildArtifacts  — classic, stored in Azure DevOps
#   PublishPipelineArtifact / DownloadPipelineArtifact — newer, faster, same storage
#
# We'll use the classic system (works with free tier, widely supported).

trigger: none

pool:
  vmImage: 'ubuntu-latest'

stages:
  # ─── Stage 1: CREATE artifacts ────────────────────────────────────────────
  - stage: Build
    jobs:
      - job: BuildAndPublish
        steps:
          - script: |
              echo "Building static site..."

              # CONCEPT: Build.ArtifactStagingDirectory
              # A dedicated folder on the agent for files you want to publish.
              # Path: /home/vsts/work/1/a
              echo "Artifact dir: $(Build.ArtifactStagingDirectory)"

              # Copy app files to staging dir
              mkdir -p "$(Build.ArtifactStagingDirectory)/site"
              cp app/*.html "$(Build.ArtifactStagingDirectory)/site/" 2>/dev/null || true
              cp app/*.css  "$(Build.ArtifactStagingDirectory)/site/" 2>/dev/null || true

              # Create a build metadata file
              echo "{\"buildId\": \"$(Build.BuildId)\", \"branch\": \"$(Build.SourceBranchName)\"}" \
                > "$(Build.ArtifactStagingDirectory)/site/build-info.json"

              ls -la "$(Build.ArtifactStagingDirectory)/site/"
            displayName: 'Build and stage files'

          # CONCEPT: PublishBuildArtifacts
          # Uploads files from ArtifactStagingDirectory to Azure DevOps artifact storage.
          # After this, files are available to any subsequent job/stage via download.
          - task: PublishBuildArtifacts@1
            displayName: 'Publish site artifact'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)/site'
              artifactName: 'website'          # name used to download it later
              publishLocation: 'Container'     # store in Azure DevOps (not file share)

          # You can publish MULTIPLE artifacts from one job
          - script: |
              mkdir -p "$(Build.ArtifactStagingDirectory)/infra"
              cp terraform/vm/*.tf "$(Build.ArtifactStagingDirectory)/infra/" 2>/dev/null || true
            displayName: 'Stage Terraform files'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish infra artifact'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)/infra'
              artifactName: 'terraform-vm'

  # ─── Stage 2: CONSUME artifacts ───────────────────────────────────────────
  - stage: Deploy
    dependsOn: Build
    jobs:
      - job: DownloadAndDeploy
        steps:
          # CONCEPT: DownloadBuildArtifacts
          # Downloads artifact to $(Pipeline.Workspace)/<artifactName>/
          - task: DownloadBuildArtifacts@1
            displayName: 'Download website artifact'
            inputs:
              artifactName: 'website'
              downloadPath: '$(Pipeline.Workspace)'
              # buildType: 'current' (default) — from this pipeline run
              # buildType: 'specific' — from a different pipeline or build number

          - task: DownloadBuildArtifacts@1
            displayName: 'Download terraform artifact'
            inputs:
              artifactName: 'terraform-vm'
              downloadPath: '$(Pipeline.Workspace)'

          - script: |
              echo "=== Downloaded artifacts ==="
              echo "Website files:"
              ls -la $(Pipeline.Workspace)/website/

              echo ""
              echo "Terraform files:"
              ls -la $(Pipeline.Workspace)/terraform-vm/

              echo ""
              echo "Build info:"
              cat $(Pipeline.Workspace)/website/build-info.json
            displayName: 'Show downloaded artifacts'

          - script: |
              echo "Deploying $(Pipeline.Workspace)/website/ to server..."
              echo "Deploy complete"
            displayName: 'Deploy website'

  # ─── Cross-pipeline artifact download ────────────────────────────────────
  # You can also download artifacts from a DIFFERENT pipeline.
  # Useful when pipelines are split: one builds, one deploys.
  - stage: CrossPipelineExample
    dependsOn: []
    jobs:
      - job: ExplainCrossPipeline
        steps:
          - script: |
              echo "To download from another pipeline, use:"
              echo ""
              echo "- task: DownloadBuildArtifacts@1"
              echo "  inputs:"
              echo "    buildType: specific"
              echo "    project: Adds"
              echo "    pipeline: <pipeline-definition-id>"
              echo "    buildVersionToDownload: latest"
              echo "    artifactName: website"
              echo "    downloadPath: \$(Pipeline.Workspace)"
            displayName: 'Cross-pipeline download (explanation)'
