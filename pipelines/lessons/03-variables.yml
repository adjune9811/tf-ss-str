# LESSON 3: All 5 types of variables
#
# Override priority (highest wins):
#   Runtime (queue-time) > Step-level > Job-level > Stage-level > Pipeline-level > Variable Group

trigger: none    # manual only for this lesson

pool:
  vmImage: 'ubuntu-latest'

# ─── TYPE 1: Pipeline-level variables ────────────────────────────────────────
# Defined at the top. Available everywhere in the pipeline.
variables:
  # Simple key-value
  APP_NAME: 'my-website'
  DEPLOY_ENV: 'dev'
  MAX_RETRIES: 3

  # Link a Variable Group from Azure DevOps Library
  # (Uncomment once you create the group in Azure DevOps → Pipelines → Library)
  # - group: vm-deploy-secrets

  # Named variable (alternative syntax that supports expressions)
  - name: IMAGE_TAG
    value: $(Build.BuildId)

  # Computed from another variable using an expression
  - name: FULL_IMAGE_NAME
    value: 'myacr.azurecr.io/$(APP_NAME):$(IMAGE_TAG)'

stages:
  - stage: VariableDemo
    displayName: 'Variable Types Demo'

    # ─── TYPE 2: Stage-level variables ─────────────────────────────────────
    # Available to all jobs within this stage only.
    variables:
      STAGE_VAR: 'I am only available in this stage'
      STAGE_REGION: 'eastus'

    jobs:
      - job: TypesDemo
        displayName: 'Demonstrate all variable types'

        # ─── TYPE 3: Job-level variables ───────────────────────────────────
        # Available to all steps within this job only.
        variables:
          JOB_VAR: 'I am only available in this job'
          BUILD_CONFIG: 'Release'

        steps:
          - script: |
              echo "=== Pipeline-level variables ==="
              echo "APP_NAME      = $(APP_NAME)"
              echo "DEPLOY_ENV    = $(DEPLOY_ENV)"
              echo "IMAGE_TAG     = $(IMAGE_TAG)"
              echo "FULL_IMAGE    = $(FULL_IMAGE_NAME)"

              echo ""
              echo "=== Stage-level variables ==="
              echo "STAGE_VAR     = $(STAGE_VAR)"
              echo "STAGE_REGION  = $(STAGE_REGION)"

              echo ""
              echo "=== Job-level variables ==="
              echo "JOB_VAR       = $(JOB_VAR)"
              echo "BUILD_CONFIG  = $(BUILD_CONFIG)"
            displayName: 'Print all variable types'

          # ─── TYPE 4: Step-level (env) variables ────────────────────────
          # Passed as environment variables to this specific step only.
          # Use for: secrets (never log them), step-specific config.
          - script: |
              echo "SECRET_VAL is available as an env var: $SECRET_VAL"
              echo "Notice: pipeline variables use \$(VAR), env vars use \$VAR (bash)"
            displayName: 'Step-level env variables'
            env:
              SECRET_VAL: 'step-scoped-value'   # in real use: $(mySecretVar)
              ANOTHER_VAR: '$(APP_NAME)-suffix'  # can mix pipeline vars into env

          # ─── TYPE 5: Runtime / output variables ────────────────────────
          # A step can SET a variable that later steps can read.
          # This is how you pass computed values between steps.
          - script: |
              # Compute something at runtime
              GIT_HASH=$(echo "$(Build.SourceVersion)" | cut -c1-7)
              COMPUTED_TAG="$(APP_NAME)-$GIT_HASH"

              # SET a runtime variable using this special syntax
              echo "##vso[task.setvariable variable=GIT_SHORT_HASH]$GIT_HASH"
              echo "##vso[task.setvariable variable=COMPUTED_TAG]$COMPUTED_TAG"

              echo "Set GIT_SHORT_HASH=$GIT_HASH and COMPUTED_TAG=$COMPUTED_TAG"
            displayName: 'Set runtime variable'

          - script: |
              # READ the runtime variable set by previous step
              echo "GIT_SHORT_HASH = $(GIT_SHORT_HASH)"
              echo "COMPUTED_TAG   = $(COMPUTED_TAG)"
            displayName: 'Read runtime variable (set by previous step)'

      # ─── Passing output variables BETWEEN jobs ────────────────────────────
      # Variables from one job can be passed to another — but you must
      # declare them explicitly. This is slightly more complex.
      - job: ProducerJob
        displayName: 'Job that produces an output variable'
        steps:
          - script: |
              # isOutput=true makes this variable available to OTHER jobs
              echo "##vso[task.setvariable variable=DEPLOY_VERSION;isOutput=true]2.1.$(Build.BuildId)"
            name: setVersion       # IMPORTANT: job step must have a 'name' to reference it
            displayName: 'Set output variable'

      - job: ConsumerJob
        displayName: 'Job that reads output from ProducerJob'
        dependsOn: ProducerJob    # must run after ProducerJob
        variables:
          # Syntax: dependencies.<jobName>.outputs['<stepName>.<variableName>']
          DEPLOY_VERSION: $[ dependencies.ProducerJob.outputs['setVersion.DEPLOY_VERSION'] ]
        steps:
          - script: echo "Got version from ProducerJob: $(DEPLOY_VERSION)"
            displayName: 'Use cross-job variable'
