# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE: Deploy Azure Storage via Terraform
#
# Stages:
#   1. Validate  — terraform fmt + validate (fast, no Azure calls)
#   2. Plan      — terraform plan (shows what will change, no apply yet)
#   3. Apply Dev — terraform apply to dev  (auto-approved)
#   4. Apply Prod— terraform apply to prod (requires manual approval in Azure DevOps)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/storage/**      # only run when storage TF files change
      - pipelines/deploy-storage.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/storage/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  TF_WORKING_DIR: '$(System.DefaultWorkingDirectory)/terraform/storage'
  TF_VERSION: '1.7.5'
  SERVICE_CONNECTION: 'azure-service-connection'   # name you gave it in Project Settings
  BACKEND_RG: 'rg-terraform-state'
  BACKEND_SA: 'stterraformstate001'
  BACKEND_CONTAINER: 'tfstate'

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1: VALIDATE
# Run on every push and every PR. Fast — no Azure API calls.
# ══════════════════════════════════════════════════════════════════════════════
stages:
  - stage: Validate
    displayName: 'Validate Terraform'
    jobs:
      - job: TerraformValidate
        displayName: 'fmt + validate'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform $(TF_VERSION)'
            inputs:
              terraformVersion: $(TF_VERSION)

          # terraform fmt -check: fails if any .tf file is not properly formatted
          # This enforces code style — same as a linter
          - script: |
              cd $(TF_WORKING_DIR)
              echo "=== Checking Terraform formatting ==="
              terraform fmt -check -recursive
              echo "Formatting OK"
            displayName: 'terraform fmt -check'

          # terraform init with -backend=false: downloads providers locally
          # without connecting to the Azure backend — fast, no credentials needed
          - script: |
              cd $(TF_WORKING_DIR)
              echo "=== Initializing providers (no backend) ==="
              terraform init -backend=false
            displayName: 'terraform init (no backend)'

          # terraform validate: checks syntax and internal consistency
          # catches things like missing required arguments, wrong types
          - script: |
              cd $(TF_WORKING_DIR)
              echo "=== Validating configuration ==="
              terraform validate
              echo "Validation passed"
            displayName: 'terraform validate'

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 2: PLAN
# Connects to Azure and shows exactly what will change — no modifications yet.
# Runs on main branch only (PRs only get Validate).
# ══════════════════════════════════════════════════════════════════════════════
  - stage: Plan
    displayName: 'Terraform Plan (Dev)'
    dependsOn: Validate
    condition: |
      and(
        succeeded('Validate'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: TerraformPlan
        displayName: 'terraform plan'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(TF_VERSION)

          # Full init with Azure backend — downloads providers + connects to state
          - task: TerraformTaskV4@4
            displayName: 'terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(TF_WORKING_DIR)
              backendServiceArm: $(SERVICE_CONNECTION)
              backendAzureRmResourceGroupName: $(BACKEND_RG)
              backendAzureRmStorageAccountName: $(BACKEND_SA)
              backendAzureRmContainerName: $(BACKEND_CONTAINER)
              backendAzureRmKey: 'storage/terraform.tfstate'

          # Plan with -var to pass environment-specific values
          # The plan is saved to tfplan file so Apply stage uses the exact same plan
          - task: TerraformTaskV4@4
            displayName: 'terraform plan (dev)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: $(TF_WORKING_DIR)
              environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
              commandOptions: >
                -out=$(TF_WORKING_DIR)/tfplan
                -var="environment=dev"
                -var="project=devops-demo"
                -var="replication_type=LRS"

          # Publish the plan file so Apply stage can download it
          # Also publish a human-readable plan for review
          - script: |
              cd $(TF_WORKING_DIR)
              echo "=== Plan Summary ==="
              terraform show -no-color tfplan
            displayName: 'Show plan summary'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish tfplan artifact'
            inputs:
              pathToPublish: $(TF_WORKING_DIR)
              artifactName: 'tfplan-dev'

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 3: APPLY DEV
# Applies the exact plan from Stage 2. Auto-approved for dev.
# ══════════════════════════════════════════════════════════════════════════════
  - stage: ApplyDev
    displayName: 'Terraform Apply (Dev)'
    dependsOn: Plan
    condition: succeeded('Plan')
    jobs:
      - deployment: ApplyDevJob
        displayName: 'terraform apply → dev'
        # 'dev-infra' environment has NO approval gate — applies automatically
        environment: 'dev-infra'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: $(TF_VERSION)

                - task: DownloadBuildArtifacts@1
                  displayName: 'Download tfplan'
                  inputs:
                    artifactName: 'tfplan-dev'
                    downloadPath: '$(Pipeline.Workspace)'

                - task: TerraformTaskV4@4
                  displayName: 'terraform init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: $(TF_WORKING_DIR)
                    backendServiceArm: $(SERVICE_CONNECTION)
                    backendAzureRmResourceGroupName: $(BACKEND_RG)
                    backendAzureRmStorageAccountName: $(BACKEND_SA)
                    backendAzureRmContainerName: $(BACKEND_CONTAINER)
                    backendAzureRmKey: 'storage/terraform.tfstate'

                # Apply the saved plan — no surprises, applies exactly what was planned
                - task: TerraformTaskV4@4
                  displayName: 'terraform apply'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: $(TF_WORKING_DIR)
                    environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
                    commandOptions: '-auto-approve $(Pipeline.Workspace)/tfplan-dev/tfplan'

                # Print outputs so you can see the storage account name, endpoint, etc.
                - script: |
                    cd $(TF_WORKING_DIR)
                    echo "=== Terraform Outputs ==="
                    terraform output -no-color
                  displayName: 'Show outputs'

                # Tag this pipeline run with what was deployed
                - script: |
                    echo "##vso[build.updatebuildnumber]storage-dev-$(Build.BuildId)"
                  displayName: 'Update build number'

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 4: APPLY PROD
# Same as Dev but:
#   - uses environment=prod (GRS replication, larger soft delete window)
#   - 'prod-infra' environment has a MANUAL APPROVAL GATE
#   - someone must approve in Azure DevOps before this runs
#
# To add approval:
#   Pipelines > Environments > prod-infra > Approvals and checks > + Approvals
# ══════════════════════════════════════════════════════════════════════════════
  - stage: ApplyProd
    displayName: 'Terraform Apply (Prod) — requires approval'
    dependsOn: ApplyDev
    condition: succeeded('ApplyDev')
    jobs:
      - deployment: ApplyProdJob
        displayName: 'terraform apply → prod'
        environment: 'prod-infra'   # <── add approval gate here in Azure DevOps UI
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: $(TF_VERSION)

                - task: TerraformTaskV4@4
                  displayName: 'terraform init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: $(TF_WORKING_DIR)
                    backendServiceArm: $(SERVICE_CONNECTION)
                    backendAzureRmResourceGroupName: $(BACKEND_RG)
                    backendAzureRmStorageAccountName: $(BACKEND_SA)
                    backendAzureRmContainerName: $(BACKEND_CONTAINER)
                    backendAzureRmKey: 'storage/terraform.tfstate'

                # Re-plan for prod with prod-specific vars
                # We re-plan here (not re-use dev plan) because prod vars differ
                - task: TerraformTaskV4@4
                  displayName: 'terraform plan (prod)'
                  inputs:
                    provider: 'azurerm'
                    command: 'plan'
                    workingDirectory: $(TF_WORKING_DIR)
                    environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
                    commandOptions: >
                      -out=$(TF_WORKING_DIR)/tfplan-prod
                      -var="environment=prod"
                      -var="project=devops-demo"
                      -var="replication_type=GRS"
                      -var="soft_delete_days=30"
                      -var="blob_delete_after_days=2555"

                - script: |
                    cd $(TF_WORKING_DIR)
                    echo "=== PROD Plan — review before approval ==="
                    terraform show -no-color tfplan-prod
                  displayName: 'Show prod plan'

                - task: TerraformTaskV4@4
                  displayName: 'terraform apply (prod)'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: $(TF_WORKING_DIR)
                    environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
                    commandOptions: '-auto-approve $(TF_WORKING_DIR)/tfplan-prod'

                - script: |
                    cd $(TF_WORKING_DIR)
                    echo "=== Prod Outputs ==="
                    terraform output -no-color
                  displayName: 'Show prod outputs'
