# TEMPLATE: reusable deployment job
# This is a JOB template — it defines a whole job, not just steps.
# Call it with:
#   - template: templates/job-deploy.yml
#     parameters:
#       environment: 'staging'
#       vmIp: '10.0.0.5'

parameters:
  - name: environment
    type: string                  # 'dev', 'staging', 'prod'

  - name: vmIp
    type: string

  - name: adminUser
    type: string
    default: 'azureuser'

  - name: artifactName
    type: string
    default: 'website'

  - name: remoteDir
    type: string
    default: '/var/www/html'

jobs:
  - deployment: DeployTo_${{ parameters.environment }}
    displayName: 'Deploy to ${{ parameters.environment }}'
    environment: '${{ parameters.environment }}-vm'

    strategy:
      runOnce:
        deploy:
          steps:
            - task: DownloadBuildArtifacts@1
              displayName: 'Download ${{ parameters.artifactName }}'
              inputs:
                artifactName: '${{ parameters.artifactName }}'
                downloadPath: '$(Pipeline.Workspace)'

            - script: |
                echo "Deploying to ${{ parameters.environment }} at ${{ parameters.vmIp }}"
                echo "scp to ${{ parameters.adminUser }}@${{ parameters.vmIp }}:${{ parameters.remoteDir }}"
              displayName: 'Deploy to ${{ parameters.environment }}'

            - script: |
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://${{ parameters.vmIp }})
                [ "$HTTP" = "200" ] && echo "OK" || (echo "FAILED: $HTTP"; exit 1)
              displayName: 'Smoke test ${{ parameters.environment }}'
